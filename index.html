<!DOCTYPE html>
<html>
  <head>
    <title>AR.js - Maqueta Giratoria</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      /* Estilo de los botones de rotación */
      .panel-controles {
        position: absolute;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000;
        display: flex;
        gap: 20px;
      }
      .btn-ar {
        background-color: rgba(0, 0, 0, 0.8);
        color: white;
        border: 2px solid white;
        padding: 15px 25px;
        font-size: 20px;
        border-radius: 10px;
        font-weight: bold;
        touch-action: manipulation;
        cursor: pointer;
      }
      .btn-ar:active {
        background-color: white;
        color: black;
      }
    </style>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    
    <div class="panel-controles">
      <button class="btn-ar" id="btn-izq">↺ Girar</button>
      <button class="btn-ar" id="btn-der">↻ Girar</button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false" renderer="logarithmicDepthBuffer: true;">
      
      <a-marker preset="hiro">
        
        <a-entity rotation="-90 0 0">
          
          <a-entity 
            id="mi-casa"
            gltf-model="url(Untitled.glb)" 
            scale="0.02 0.02 0.02" 
            position="0 0 0"
            rotation="0 0 0">
          </a-entity>
          
        </a-entity>

      </a-marker>
      
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const casa = document.querySelector('#mi-casa');
      let anguloY = 0;
      // Ajusta este número si quieres que gire más rápido o más lento por cada clic
      const velocidadRotacion = 15; 

      document.querySelector('#btn-izq').onclick = () => {
        anguloY += velocidadRotacion;
        // Solo rotamos en el eje Y (el eje vertical de la casa)
        casa.setAttribute('rotation', `0 ${anguloY} 0`);
      };

      document.querySelector('#btn-der').onclick = () => {
        anguloY -= velocidadRotacion;
        casa.setAttribute('rotation', `0 ${anguloY} 0`);
      };
    </script>
  </body>
</html>
