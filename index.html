<!DOCTYPE html>
<html>
  <head>
    <title>AR.js - Recorrido con Botones</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      /* Diseño de los botones tipo control de videojuego */
      .panel-controles {
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000; /* Asegura que estén por encima de la cámara */
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
      }
      .fila-botones {
        display: flex;
        gap: 5px;
      }
      .btn-ar {
        background-color: rgba(0, 0, 0, 0.7);
        color: white;
        border: 2px solid white;
        padding: 15px 20px;
        font-size: 18px;
        border-radius: 10px;
        font-weight: bold;
        touch-action: manipulation; /* Evita el zoom al tocar rápido */
      }
      .btn-ar:active {
        background-color: white;
        color: black;
      }
    </style>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    
    <div class="panel-controles">
      <button class="btn-ar" id="btn-adelante">⬆️</button>
      <div class="fila-botones">
        <button class="btn-ar" id="btn-izquierda">⬅️</button>
        <button class="btn-ar" id="btn-atras">⬇️</button>
        <button class="btn-ar" id="btn-derecha">➡️</button>
      </div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false" renderer="logarithmicDepthBuffer: true;">
      
      <a-marker preset="hiro">
        <a-entity 
          id="mi-casa"
          gltf-model="url(Untitled.glb)" 
          scale="0.02 0.02 0.02" 
          position="0 0 0"
          rotation="-90 0 0">
        </a-entity>
      </a-marker>
      
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // Seleccionamos el modelo 3D
      const casa = document.querySelector('#mi-casa');
      // Ajusta este valor si quieres que se mueva más rápido o más lento
      const velocidad = 0.5; 

      // Mover Adelante
      document.querySelector('#btn-adelante').onclick = () => {
        let pos = casa.getAttribute('position');
        casa.setAttribute('position', {x: pos.x, y: pos.y + velocidad, z: pos.z});
      };
      
      // Mover Atrás
      document.querySelector('#btn-atras').onclick = () => {
        let pos = casa.getAttribute('position');
        casa.setAttribute('position', {x: pos.x, y: pos.y - velocidad, z: pos.z});
      };

      // Mover Izquierda
      document.querySelector('#btn-izquierda').onclick = () => {
        let pos = casa.getAttribute('position');
        casa.setAttribute('position', {x: pos.x - velocidad, y: pos.y, z: pos.z});
      };

      // Mover Derecha
      document.querySelector('#btn-derecha').onclick = () => {
        let pos = casa.getAttribute('position');
        casa.setAttribute('position', {x: pos.x + velocidad, y: pos.y, z: pos.z});
      };
    </script>
  </body>
</html>
