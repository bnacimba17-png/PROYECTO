<!DOCTYPE html>
<html>
  <head>
    <title>AR.js - Visualización de Modelos</title>
    <!-- Importamos A-Frame y AR.js -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    
    <!-- Iniciamos la escena AR y encendemos la cámara -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;">
      
      <!-- Usamos el marcador por defecto "hiro" -->
      <a-marker preset="hiro">
        
        <!-- MODELO 1: Arquitectónico (Activo) -->
        <a-entity 
          gltf-model="url(Untitled.glb)" 
          scale="0.05 0.05 0.05" 
          position="0 0 0"
          rotation="0 0 0">
        </a-entity>

        <!-- MODELO 2: Estructural (Inactivo - Quita los comentarios <!-- y --> para usarlo) -->
        <!--
        <a-entity 
          gltf-model="url(Estructural.glb)" 
          scale="0.05 0.05 0.05" 
          position="0 0 0"
          rotation="0 0 0">
        </a-entity>
        -->

        <!-- MODELO 3: Eléctrico / Instalaciones (Inactivo - Quita los comentarios <!-- y --> para usarlo) -->
        <!--
        <a-entity 
          gltf-model="url(Electrico.glb)" 
          scale="0.05 0.05 0.05" 
          position="0 0 0"
          rotation="0 0 0">
        </a-entity>
        -->

      </a-marker>
      
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
