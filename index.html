<!DOCTYPE html>
<html>
  <head>
    <title>AR.js - Maqueta Interactiva Completa</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      /* Contenedor principal de controles */
      .contenedor-controles {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
      }

      /* Estilo del panel de flechas (D-Pad) */
      .panel-movimiento {
        display: grid;
        grid-template-columns: repeat(3, 50px);
        grid-template-rows: repeat(2, 50px);
        gap: 8px;
        justify-content: center;
      }

      /* Paneles horizontales para zoom y rotación */
      .panel-horizontal {
        display: flex;
        gap: 20px;
      }

      /* Estilo general de los botones */
      .btn-ar {
        background-color: rgba(0, 0, 0, 0.8);
        color: white;
        border: 2px solid white;
        font-size: 20px;
        border-radius: 10px;
        font-weight: bold;
        touch-action: manipulation;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .btn-ar:active {
        background-color: white;
        color: black;
      }

      /* Botones más anchos para texto */
      .btn-ancho {
        padding: 10px 20px;
      }

      /* Posiciones específicas de las flechas */
      #btn-adelante { grid-column: 2; grid-row: 1; }
      #btn-izq-mov { grid-column: 1; grid-row: 2; }
      #btn-atras { grid-column: 2; grid-row: 2; }
      #btn-der-mov { grid-column: 3; grid-row: 2; }
    </style>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    
    <div class="contenedor-controles">
      
      <div class="panel-movimiento">
        <button class="btn-ar" id="btn-adelante">↑</button>
        <button class="btn-ar" id="btn-izq-mov">←</button>
        <button class="btn-ar" id="btn-atras">↓</button>
        <button class="btn-ar" id="btn-der-mov">→</button>
      </div>

      <div class="panel-horizontal">
        <button class="btn-ar btn-ancho" id="btn-acercar">🔍 +</button>
        <button class="btn-ar btn-ancho" id="btn-alejar">🔍 -</button>
      </div>

      <div class="panel-horizontal">
        <button class="btn-ar btn-ancho" id="btn-izq">↺ Girar</button>
        <button class="btn-ar btn-ancho" id="btn-der">↻ Girar</button>
      </div>

    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false" renderer="logarithmicDepthBuffer: true;">
      
      <a-marker preset="hiro">
        
        <a-entity rotation="-90 0 0">
          
          <a-entity 
            id="mi-casa"
            gltf-model="url(Estructural.glb)" 
            scale="0.02 0.02 0.02" 
            position="0 0 0"
            rotation="0 0 0">
          </a-entity>
          
        </a-entity>

      </a-marker>
      
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const casa = document.querySelector('#mi-casa');
      
      // Variables para la Rotación
      let anguloY = 0;
      const velocidadRotacion = 15; 

      // Variables para el Movimiento
      let posX = 0;
      let posY = 0;
      const pasoMovimiento = 0.2; 

      // Variables para el Zoom (Escala)
      let escalaActual = 0.02; // Esta es la escala inicial que tenías
      // Ajusta este número si quieres que el zoom sea más brusco o más suave
      const pasoEscala = 0.005; 

      // --- Lógica de Zoom ---
      function actualizarEscala() {
        // Evitamos que la escala llegue a cero o números negativos para que no desaparezca el modelo
        if (escalaActual < 0.005) {
            escalaActual = 0.005;
        }
        casa.setAttribute('scale', `${escalaActual} ${escalaActual} ${escalaActual}`);
      }

      document.querySelector('#btn-acercar').onclick = () => {
        escalaActual += pasoEscala;
        actualizarEscala();
      };

      document.querySelector('#btn-alejar').onclick = () => {
        escalaActual -= pasoEscala;
        actualizarEscala();
      };

      // --- Lógica de Rotación ---
      document.querySelector('#btn-izq').onclick = () => {
        anguloY += velocidadRotacion;
        casa.setAttribute('rotation', `0 ${anguloY} 0`);
      };

      document.querySelector('#btn-der').onclick = () => {
        anguloY -= velocidadRotacion;
        casa.setAttribute('rotation', `0 ${anguloY} 0`);
      };

      // --- Lógica de Movimiento ---
      function actualizarPosicion() {
        casa.setAttribute('position', `${posX} ${posY} 0`);
      }

      document.querySelector('#btn-adelante').onclick = () => {
        posY += pasoMovimiento;
        actualizarPosicion();
      };

      document.querySelector('#btn-atras').onclick = () => {
        posY -= pasoMovimiento;
        actualizarPosicion();
      };

      document.querySelector('#btn-izq-mov').onclick = () => {
        posX -= pasoMovimiento;
        actualizarPosicion();
      };

      document.querySelector('#btn-der-mov').onclick = () => {
        posX += pasoMovimiento;
        actualizarPosicion();
      };
    </script>
  </body>
</html>
